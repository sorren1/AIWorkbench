<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title description">
  <title id="title">AI Delivery Workbench</title>
  <desc id="description">A governed, human-in-the-loop control plane for AI-assisted software delivery, shown as an original four-plane technical diagram.</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#d8dee8" stroke-width="1" opacity=".42"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#f7f8fa"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <path d="M0 0h12v630H0z" fill="#335cff"/>

  <g transform="translate(72 62)" fill="none" stroke-width="6">
    <rect width="58" height="58" rx="13" stroke="#2684ff"/>
    <rect x="28" y="28" width="58" height="58" rx="13" stroke="#111827"/>
    <path d="M28 28h30v30H28z" fill="#335cff" stroke="none"/>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Consolas, monospace">
    <text x="72" y="198" fill="#335cff" font-size="18" letter-spacing="2.4">INDEPENDENT ENGINEERING CASE STUDY</text>
  </g>
  <g font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="72" y="278" fill="#111827" font-size="68" font-weight="750">AI Delivery</text>
    <text x="72" y="352" fill="#111827" font-size="68" font-weight="750">Workbench</text>
    <text x="72" y="414" fill="#3f4a5a" font-size="27" font-weight="600">Governed, human-in-the-loop control</text>
    <text x="72" y="452" fill="#3f4a5a" font-size="27" font-weight="600">for AI-assisted software delivery.</text>
  </g>

  <g transform="translate(72 524)" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="15" letter-spacing="1">
    <rect width="498" height="42" rx="8" fill="#e8ecff" stroke="#c6d0ff"/>
    <text x="17" y="27" fill="#2949d3">AUTHORIZATION · CONTEXT · HUMAN GATES · EVIDENCE</text>
  </g>

  <g transform="translate(686 82)" font-family="ui-monospace, SFMono-Regular, Consolas, monospace">
    <rect width="444" height="466" rx="22" fill="#ffffff" stroke="#cfd6e0" stroke-width="2"/>
    <text x="28" y="38" fill="#697586" font-size="14" letter-spacing="1.8">CONTROL BOUNDARY</text>
    <rect x="92" y="72" width="260" height="92" rx="14" fill="#eef6ff" stroke="#2684ff" stroke-width="2"/>
    <text x="222" y="108" fill="#111827" font-size="19" font-weight="700" text-anchor="middle">CONTROL PLANE</text>
    <text x="222" y="136" fill="#566274" font-size="13" text-anchor="middle">policy · approvals · budgets</text>

    <path d="M222 164v58M222 192H76v30M222 192h146v30" fill="none" stroke="#8190a5" stroke-width="2"/>
    <circle cx="222" cy="192" r="5" fill="#335cff"/>

    <g font-size="14" text-anchor="middle">
      <rect x="26" y="222" width="130" height="88" rx="12" fill="#f7f8fa" stroke="#aeb8c6"/>
      <text x="91" y="257" fill="#111827" font-weight="700">EXECUTION</text>
      <text x="91" y="280" fill="#697586" font-size="12">bounded tools</text>

      <rect x="157" y="222" width="130" height="88" rx="12" fill="#f4fbf7" stroke="#63a77b"/>
      <text x="222" y="257" fill="#111827" font-weight="700">CONTEXT</text>
      <text x="222" y="280" fill="#697586" font-size="12">selected records</text>

      <rect x="288" y="222" width="130" height="88" rx="12" fill="#fff9ed" stroke="#c9983e"/>
      <text x="353" y="257" fill="#111827" font-weight="700">VALIDATION</text>
      <text x="353" y="280" fill="#697586" font-size="12">commit evidence</text>
    </g>

    <path d="M91 310v50h262v-50M222 310v50" fill="none" stroke="#8190a5" stroke-width="2"/>
    <rect x="92" y="360" width="260" height="72" rx="14" fill="#111827"/>
    <text x="222" y="391" fill="#ffffff" font-size="17" font-weight="700" text-anchor="middle">HUMAN DECISION</text>
    <text x="222" y="415" fill="#cfd6e0" font-size="12" text-anchor="middle">authority stays outside the model</text>
  </g>
</svg>
