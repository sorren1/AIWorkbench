<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Delivery Workbench — Clean-Room Interview Prototype</title>
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="workbench.css" />
  <style>
    /* boot splash while Babel transpiles */
    #boot { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 14px; background: var(--bg-canvas); color: var(--text-tertiary); font-family: var(--font-mono); font-size: 12px; z-index: 999; }
    #boot .m { width: 34px; height: 34px; }
    #boot.gone { opacity: 0; pointer-events: none; transition: opacity .3s ease; }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="boot">
    <svg class="m" viewBox="0 0 32 32" fill="none"><path d="M11.5 11.5 H20.5 V20.5 H11.5 Z" fill="#0E6FE6"/><rect x="3.4" y="3.4" width="17.2" height="17.2" rx="4.2" stroke="#0E6FE6" stroke-width="2.4"/><rect x="11.4" y="11.4" width="17.2" height="17.2" rx="4.2" stroke="#A9B3C2" stroke-width="2.4"/></svg>
    <div>Loading AI Delivery Workbench…</div>
  </div>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Synthetic data (plain JS, load first) -->
  <script src="data.js"></script>
  <script src="content.js"></script>

  <!-- App (Babel/JSX, order matters) -->
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="store.jsx"></script>
  <script type="text/babel" src="shell.jsx"></script>
  <script type="text/babel" src="screen-workqueue.jsx"></script>
  <script type="text/babel" src="screen-issue.jsx"></script>
  <script type="text/babel" src="screen-artifacts.jsx"></script>
  <script type="text/babel" src="screen-github.jsx"></script>
  <script type="text/babel" src="screen-validation.jsx"></script>
  <script type="text/babel" src="screen-architecture.jsx"></script>
  <script type="text/babel" src="screen-settings.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    // hide boot splash once the app mounts
    const _boot = document.getElementById("boot");
    const _check = setInterval(() => {
      if (document.querySelector(".wb-app")) { _boot.classList.add("gone"); clearInterval(_check); setTimeout(() => _boot.remove(), 400); }
    }, 60);
  </script>
</body>
</html>
