<!-- @dsCard group="Spacing" viewport="700x150" name="Radii & elevation" subtitle="Restrained radii + cool low-spread shadows" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--bg-canvas); display: flex; gap: 22px; align-items: flex-end; }
  .box { width: 92px; height: 64px; background: var(--bg-surface); border: 1px solid var(--border-subtle); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; font: 400 10px var(--font-mono); color: var(--text-tertiary); }
  .lbl { font: 400 10px var(--font-mono); color: var(--text-tertiary); text-align: center; margin-top: 6px; }
  .col { display: flex; flex-direction: column; }
</style></head>
<body>
  <div class="col"><div class="box" style="border-radius:var(--radius-sm);box-shadow:var(--shadow-xs)">sm</div><div class="lbl">5px · xs</div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-md);box-shadow:var(--shadow-sm)">md</div><div class="lbl">7px · sm</div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-lg);box-shadow:var(--shadow-md)">lg</div><div class="lbl">10px · md</div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-xl);box-shadow:var(--shadow-lg)">xl</div><div class="lbl">14px · lg</div></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-2xl);box-shadow:var(--shadow-xl)">2xl</div><div class="lbl">20px · xl</div></div>
</body></html>
