<!-- @dsCard group="Colors" viewport="700x150" name="Accent & status" subtitle="Azure accent + meaningful status colors" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 18px; background: var(--bg-canvas); }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .sw { width: 132px; border: 1px solid var(--border-subtle); border-radius: var(--radius-md); overflow: hidden; background: var(--bg-surface); }
  .chip { height: 56px; }
  .meta { padding: 7px 9px; }
  .name { font: 600 12px var(--font-sans); color: var(--text-primary); }
  .val { font: 400 11px var(--font-mono); color: var(--text-tertiary); margin-top: 2px; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--accent)"></div><div class="meta"><div class="name">Accent</div><div class="val">--accent</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--safe)"></div><div class="meta"><div class="name">Safe / verified</div><div class="val">--safe</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--warn)"></div><div class="meta"><div class="name">Caution</div><div class="val">--warn</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--danger)"></div><div class="meta"><div class="name">Denied</div><div class="val">--danger</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--secure)"></div><div class="meta"><div class="name">Secure</div><div class="val">--secure</div></div></div>
  </div>
</body></html>
