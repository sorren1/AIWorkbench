<!-- @dsCard group="Colors" viewport="700x140" name="Slate neutrals" subtitle="Cool, slightly blue-tinted ink ramp" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 18px; background: var(--bg-canvas); }
  .ramp { display: flex; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-subtle); }
  .step { flex: 1; height: 64px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; font: 500 10px var(--font-mono); }
  .lbl { display: flex; margin-top: 7px; }
  .lbl span { flex: 1; text-align: center; font: 400 10px var(--font-mono); color: var(--text-tertiary); }
</style></head>
<body>
  <div class="ramp">
    <div class="step" style="background:var(--slate-950);color:#fff">950</div>
    <div class="step" style="background:var(--slate-800);color:#fff">800</div>
    <div class="step" style="background:var(--slate-600);color:#fff">600</div>
    <div class="step" style="background:var(--slate-400);color:#fff">400</div>
    <div class="step" style="background:var(--slate-300);color:#11151b">300</div>
    <div class="step" style="background:var(--slate-200);color:#11151b">200</div>
    <div class="step" style="background:var(--slate-100);color:#11151b">100</div>
    <div class="step" style="background:var(--slate-50);color:#11151b">50</div>
  </div>
</body></html>
