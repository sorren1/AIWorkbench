name: Commit-bound production verification

on:
  workflow_dispatch:
    inputs:
      canonical_origin:
        description: Canonical HTTPS Production origin (no path)
        required: true
        default: https://tylerwilhite.dev
        type: string
      deployed_sha:
        description: Full deployed evidence-commit SHA expected in the live binding
        required: true
        type: string
      release_tag:
        description: Release tag expected in the live binding
        required: true
        type: string
      audited_sha:
        description: Full audited parent SHA expected in the live binding
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: post-deployment-${{ inputs.deployed_sha }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify exact Production deployment
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEPLOYMENT_BASE_URL: ${{ inputs.canonical_origin }}
      EXPECTED_CANONICAL_URL: ${{ inputs.canonical_origin }}
      EXPECTED_DEPLOYED_SHA: ${{ inputs.deployed_sha }}
      EXPECTED_RELEASE_TAG: ${{ inputs.release_tag }}
      EXPECTED_AUDITED_SHA: ${{ inputs.audited_sha }}
      POST_DEPLOYMENT_REQUIRE_HOSTED: "1"
      POST_DEPLOYMENT_ARTIFACT_NAME: post-deployment-verification-${{ inputs.deployed_sha }}-${{ github.run_id }}
    steps:
      - name: Check out verification implementation
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
      - name: Use supported Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Clean install
        run: npm ci
      - name: Install pinned verification browser
        run: npx playwright install --with-deps chromium
      - name: Verify the exact live Production deployment
        run: npm run post-deployment:verify
      - name: Retain sanitized commit-bound summary
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.POST_DEPLOYMENT_ARTIFACT_NAME }}
          path: .security-reports/post-deployment/post-deployment-summary.json
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 90
      - name: Retain restricted diagnostic reports
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: post-deployment-details-${{ inputs.deployed_sha }}-${{ github.run_id }}
          path: |
            .security-reports/post-deployment/details/
            .lighthouseci/
            playwright-report/
            test-results/
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 14
