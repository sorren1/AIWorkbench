name: Release-grade quality gates

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Core release controls
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Use supported Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Clean install
        run: npm ci
      - name: Install canonical screenshot engine
        run: npx playwright install --with-deps chromium
      - name: Run deterministic, security, and supply-chain gates
        run: npm run check
      - name: Retain core audit artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: quality-core-evidence-${{ github.run_id }}
          path: |
            .security-reports/
            coverage/
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 14

  browser:
    name: Browser controls (${{ matrix.browser }})
    needs: core
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, webkit]
    container:
      image: mcr.microsoft.com/playwright@sha256:5b8f294aff9041b7191c34a4bab3ac270157a28774d4b0660e9743297b697e48
      options: --user 1001 --init --ipc=host
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Use supported Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Clean install
        run: npm ci
      - name: Verify pinned browser engines
        run: npx playwright install --list
      - name: Run isolated browser release gate
        run: npx playwright test --project="${{ matrix.browser }}"
      - name: Retain browser artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: quality-${{ matrix.browser }}-evidence-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 14

  firefox:
    name: Browser controls (firefox)
    needs: core
    runs-on: windows-2025
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Use supported Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Clean install
        run: npm ci
      - name: Install pinned Firefox engine
        run: npx playwright install firefox
      - name: Run isolated Firefox release gate
        run: npx playwright test --project=firefox
      - name: Retain Firefox artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: quality-firefox-evidence-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 14

  performance:
    name: Performance controls
    needs: [browser, firefox]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: mcr.microsoft.com/playwright@sha256:5b8f294aff9041b7191c34a4bab3ac270157a28774d4b0660e9743297b697e48
      options: --user 1001 --init --ipc=host
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Use supported Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Clean install
        run: npm ci
      - name: Verify pinned browser engines
        run: npx playwright install --list
      - name: Build audited production site
        run: npm run build
      - name: Run Lighthouse release gate
        run: npm run performance:audit
      - name: Retain performance artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: quality-performance-evidence-${{ github.run_id }}
          path: .lighthouseci/
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 14
