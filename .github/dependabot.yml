version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Chicago
    # Keep the weekly queue reviewable; every proposal still passes the full release gates.
    open-pull-requests-limit: 5
    groups:
      development-tooling:
        dependency-type: development
        update-types: [minor, patch]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    # Action updates are lower-volume and require full-SHA pin review before merge.
    open-pull-requests-limit: 2
