version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Chicago
    # Keep version-update pull refs paused during the public-history publication audit.
    open-pull-requests-limit: 0
    groups:
      development-tooling:
        dependency-type: development
        update-types: [minor, patch]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    # Keep version-update pull refs paused during the public-history publication audit.
    open-pull-requests-limit: 0
